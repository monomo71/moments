version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    environment:
      - PORT=3001
      - DATABASE_URL=file:/app/data/dev.db
      - JWT_SECRET=supersecret

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:80"
